name: Desktop Build Artifacts

on:
  push:
    branches:
      - "**"
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          arch: "win64_msvc2022_64"
          cache: true

      - name: Configure (CMake + Ninja)
        shell: pwsh
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DPTZ_TRACKING_DOCK_DYNAMIC_LOOKUP=ON

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Collect plugin artifact
        shell: pwsh
        run: |
          $dll = Get-ChildItem -Path build -Filter ptz-tracking-dock.dll -Recurse | Select-Object -First 1
          if (-not $dll) {
            throw "ptz-tracking-dock.dll not found in build output"
          }

          New-Item -ItemType Directory -Force -Path artifact/obs-plugins/64bit | Out-Null
          Copy-Item $dll.FullName artifact/obs-plugins/64bit/ptz-tracking-dock.dll -Force
          Compress-Archive -Path artifact/obs-plugins -DestinationPath ptz-tracking-dock-windows.zip -Force

      - name: Build Windows installer
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $version = "0.1.0"
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          }
          packaging\windows\build-installer.ps1 `
            -SourceDll artifact\obs-plugins\64bit\ptz-tracking-dock.dll `
            -AppVersion "$version" `
            -OutputDir .

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ptz-tracking-dock-windows
          path: |
            ptz-tracking-dock-windows.zip
            ptz-tracking-dock-windows-installer.exe

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          arch: "clang_64"
          cache: true

      - name: Configure (CMake + Ninja)
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPTZ_TRACKING_DOCK_DYNAMIC_LOOKUP=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Collect plugin artifact
        run: |
          bundle="$(find build -type d -name 'ptz-tracking-dock.plugin' | head -n 1)"
          if [[ -z "$bundle" ]]; then
            echo "ptz-tracking-dock.plugin not found in build output"
            exit 1
          fi
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent "$bundle" ptz-tracking-dock-macos.zip
          version="0.1.0"
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          fi
          bash packaging/macos/build-pkg.sh "$bundle" ptz-tracking-dock-macos-installer.pkg "$version"

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ptz-tracking-dock-macos
          path: |
            ptz-tracking-dock-macos.zip
            ptz-tracking-dock-macos-installer.pkg

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-windows
      - build-macos
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create or update release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 || \
            gh release create "$tag" --repo "${GITHUB_REPOSITORY}" --generate-notes
          gh release upload "$tag" \
            dist/ptz-tracking-dock-windows/ptz-tracking-dock-windows.zip \
            dist/ptz-tracking-dock-windows/ptz-tracking-dock-windows-installer.exe \
            dist/ptz-tracking-dock-macos/ptz-tracking-dock-macos.zip \
            dist/ptz-tracking-dock-macos/ptz-tracking-dock-macos-installer.pkg \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
